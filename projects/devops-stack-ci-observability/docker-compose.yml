services:
  proxy:
    image: nginx:stable-alpine
    container_name: proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - gitea
      - jenkins
      - sonarqube
      - prometheus
      - grafana
    networks:
      - public
      - internal
    restart: unless-stopped

  postgres:
    image: postgres:alpine
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # These are used by init script:
      GITEA_DB_PASSWORD: ${GITEA_DB_PASSWORD}
      SONAR_DB_PASSWORD: ${SONAR_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal
    restart: unless-stopped

  gitea:
    image: gitea/gitea:latest
    container_name: gitea
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: postgres:5432
      GITEA__database__NAME: gitea
      GITEA__database__USER: gitea
      GITEA__database__PASSWD: ${GITEA_DB_PASSWORD}

      GITEA__server__DOMAIN: gitea.local
      GITEA__server__ROOT_URL: http://gitea.local/
      GITEA__server__SSH_DOMAIN: gitea.local
      GITEA__server__SSH_PORT: 2222
      GITEA__service__DISABLE_REGISTRATION: "true"
    volumes:
      - gitea_data:/data
    ports:
      - "2222:22"   # git over SSH (optional)
    networks:
      - internal
    restart: unless-stopped

  jenkins:
    build:
      context: ./jenkins
    container_name: jenkins
    user: root
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # Helpful defaults (you still configure Jenkins URL in UI later)
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=true"
    networks:
      - internal
    restart: unless-stopped

  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    depends_on:
      sonar-db:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonarqube
      SONAR_JDBC_PASSWORD: ${SONAR_DB_PASSWORD}
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
    networks:
      - internal
    restart: unless-stopped

  sonar-db:
    image: postgres:16-alpine
    container_name: sonar-db
    environment:
      POSTGRES_USER: sonarqube
      POSTGRES_PASSWORD: ${SONAR_DB_PASSWORD}
      POSTGRES_DB: sonarqube
    volumes:
      - sonar_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonarqube -d sonarqube"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal
    restart: unless-stopped

  registry:
    image: registry:2
    container_name: registry
    environment:
      REGISTRY_AUTH: htpasswd
      REGISTRY_AUTH_HTPASSWD_REALM: "Registry Realm"
      REGISTRY_AUTH_HTPASSWD_PATH: /auth/htpasswd
      REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY: /var/lib/registry
    volumes:
      - registry_data:/var/lib/registry
      - ./registry/auth:/auth:ro
    ports:
      - "5000:5000"
    networks:
      - internal
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - internal
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - internal
    restart: unless-stopped

  # Host + container metrics for Prometheus/Grafana
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    pid: host
    command:
      - --path.rootfs=/host
    volumes:
      - /:/host:ro,rslave
    networks:
      - internal
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - internal
    restart: unless-stopped

networks:
  public:
  internal:

volumes:
  postgres_data:
  gitea_data:
  jenkins_home:
  sonarqube_data:
  sonarqube_extensions:
  registry_data:
  prometheus_data:
  grafana_data:
  sonar_db_data:
